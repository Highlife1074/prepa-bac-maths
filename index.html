<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Révisions Maison : IA Cloud</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="app-container" class="bg-white p-8 rounded-xl shadow-lg max-w-2xl w-full">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // VOS CLÉS FIREBASE (La sauvegarde)
        const firebaseConfig = {
            apiKey: "AIzaSyCD-3YfPCRPDVzYgQ0FW-XPxf4gZkPIO88",
            authDomain: "famille-revision.firebaseapp.com",
            projectId: "famille-revision",
            storageBucket: "famille-revision.firebasestorage.app",
            messagingSenderId: "124956066429",
            appId: "1:124956066429:web:b68b839ce55e9b6e67e714"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ⚠️ L'ADRESSE DE VOTRE NOUVEAU CERVEAU IA (COLLEZ VOTRE LIEN ICI)
        const URL_SERVEUR_IA = "URL_DE_VOTRE_SERVEUR_ICI";

        // Les thèmes de révision possibles pour l'IA
        const themes1ere = ["Produit Scalaire", "Probabilités", "Équations Cartésiennes", "Suites Numériques", "Fonctions Dérivées"];
        const themesCM2 = ["Fractions", "Nombres Décimaux", "Proportionnalité", "Géométrie", "Conversions de mesures"];

        let currentProfile = "";
        let currentIndex = 0;
        let score = 0;
        let hintLevel = 0;
        let currentQ = null; // La question actuelle générée par l'IA

        const container = document.getElementById('app-container');

        window.showHome = function() {
            container.innerHTML = 
                '<div class="text-center">' +
                    '<h1 class="text-3xl font-bold text-gray-800 mb-2">Espace Cloud IA</h1>' +
                    '<p class="text-gray-500 mb-8">Génération d\'exercices infinis en temps réel.</p>' +
                    '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">' +
                        '<button onclick="startApp(\'1ere\')" class="p-6 border-2 border-blue-500 rounded-xl hover:bg-blue-50 transition">' +
                            '<h2 class="text-2xl font-bold text-blue-600 mb-2">Objectif Bac</h2>' +
                            '<p class="text-sm text-gray-600">Maths (1ère)</p>' +
                        '</button>' +
                        '<button onclick="startApp(\'cm2\')" class="p-6 border-2 border-green-500 rounded-xl hover:bg-green-50 transition">' +
                            '<h2 class="text-2xl font-bold text-green-600 mb-2">Objectif Collège</h2>' +
                            '<p class="text-sm text-gray-600">Maths (CM2)</p>' +
                        '</button>' +
                    '</div>' +
                '</div>';
        };

        window.startApp = async function(profile) {
            currentProfile = profile;
            
            container.innerHTML = '<div class="text-center py-10"><p class="text-xl text-gray-600 animate-pulse">Connexion au profil...</p></div>';

            // 1. Récupération de la sauvegarde Firebase
            try {
                const docRef = doc(db, "users", profile);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    currentIndex = docSnap.data().currentIndex || 0;
                    score = docSnap.data().score || 0;
                } else {
                    currentIndex = 0;
                    score = 0;
                }
            } catch (error) {
                console.error("Erreur Firebase:", error);
            }

            // 2. On demande la première question à l'IA
            demanderQuestionIA();
        };

        // --- LA MAGIE OPÈRE ICI : CONNEXION AU SERVEUR ---
        async function demanderQuestionIA() {
            container.innerHTML = `
                <div class="text-center py-10">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-gray-900 mx-auto mb-4"></div>
                    <p class="text-xl text-gray-600 animate-pulse">Le professeur prépare l'exercice sur mesure...</p>
                </div>
            `;

            const themes = currentProfile === '1ere' ? themes1ere : themesCM2;
            const themeChoisi = themes[Math.floor(Math.random() * themes.length)];

            try {
                const reponse = await fetch(URL_SERVEUR_IA, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        profil: currentProfile === '1ere' ? "1ère spécialité Maths" : "CM2",
                        theme: themeChoisi,
                        niveau: 1
                    })
                });

                currentQ = await reponse.json();
                hintLevel = 0;
                render(); // On affiche la question générée !

            } catch (error) {
                console.error("Erreur avec l'IA:", error);
                container.innerHTML = `<div class="text-center py-10 text-red-600">Erreur de connexion au professeur IA. Rechargez la page.</div>`;
            }
        }

        async function saveDataToCloud() {
            try {
                const docRef = doc(db, "users", currentProfile);
                await setDoc(docRef, { currentIndex, score, lastActive: new Date() }, { merge: true });
            } catch (error) {}
        }

        function render() {
            if (!currentQ) return;
            const themeColor = currentProfile === '1ere' ? 'blue' : 'green';
            
            let hintsHtml = '';
            if (hintLevel > 0) {
                let listItems = '';
                for(let i = 0; i < hintLevel; i++) {
                    if(currentQ.hints[i]) listItems += '<li>' + currentQ.hints[i] + '</li>';
                }
                hintsHtml = '<ul class="mt-3 space-y-2 list-disc list-inside text-sm text-red-700">' + listItems + '</ul>';
            }

            container.innerHTML = 
                '<div class="mb-6 flex justify-between items-center border-b pb-4">' +
                    '<span class="text-sm font-semibold text-' + themeColor + '-600 uppercase tracking-wider">' + currentQ.theme + '</span>' +
                    '<span class="text-sm text-gray-500">Généré par IA ✨</span>' +
                '</div>' +
                '<div class="mb-8">' +
                    '<p class="text-xs text-gray-400 mb-2">Objectif : ' + currentQ.target + '</p>' +
                    '<h2 class="text-xl font-medium text-gray-800">' + currentQ.question + '</h2>' +
                '</div>' +
                '<div id="feedback-area" class="hidden p-4 rounded-lg mb-4"></div>' +
                '<div class="mb-6">' +
                    '<input type="text" id="user-answer" placeholder="Ta réponse ici..." class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-' + themeColor + '-500 focus:outline-none mb-4" />' +
                    '<button onclick="checkAnswer()" id="submit-btn" class="w-full bg-' + themeColor + '-600 hover:bg-' + themeColor + '-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">Valider</button>' +
                    '<button onclick="showHint()" id="hint-btn" class="hidden mt-4 text-sm underline text-red-600 hover:text-red-800">J\'ai besoin d\'un indice</button>' +
                    hintsHtml +
                '</div>' +
                '<div class="text-center mt-4">' +
                     '<button onclick="showHome()" class="text-xs text-gray-400 underline hover:text-gray-600">Quitter l\'exercice</button>' +
                '</div>';
        }

        window.checkAnswer = function() {
            const userAnswer = document.getElementById('user-answer').value.trim().toLowerCase();
            const feedbackArea = document.getElementById('feedback-area');
            
            if (userAnswer === currentQ.answer.toLowerCase()) {
                if (hintLevel === 0) score++;
                currentIndex++;
                saveDataToCloud();
                
                feedbackArea.className = "bg-green-50 text-green-700 p-4 rounded-lg mb-4 block";
                feedbackArea.innerHTML = 
                    '<p class="font-bold text-lg mb-2">Bravo ! 🎉</p>' +
                    '<p class="text-sm mb-4">' + currentQ.explanation + '</p>' +
                    '<button onclick="demanderQuestionIA()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">Question suivante (IA)</button>';
                
                document.getElementById('submit-btn').style.display = 'none';
                document.getElementById('hint-btn').style.display = 'none';
            } else {
                feedbackArea.className = "bg-red-50 text-red-700 p-4 rounded-lg mb-4 block";
                feedbackArea.innerHTML = '<p class="font-semibold">Ce n\'est pas tout à fait ça. Essaie encore !</p>';
                if (hintLevel < currentQ.hints.length) {
                    document.getElementById('hint-btn').style.display = 'block';
                }
            }
        };

        window.showHint = function() { hintLevel++; render(); };
        window.demanderQuestionIA = demanderQuestionIA;

        showHome();
    </script>
</body>
</html>
