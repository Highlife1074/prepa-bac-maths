<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Famille Révision - IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <header class="bg-indigo-600 text-white shadow-lg p-4 mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fas fa-graduation-cap mr-2"></i>Famille Révision</h1>
            <div id="user-info" class="hidden text-sm bg-indigo-700 px-3 py-1 rounded-full"></div>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-4xl">
        <div id="app-container" class="bg-white rounded-2xl shadow-xl p-6 min-h-[400px]">
            </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        // L'URL de ton serveur Firebase Cloud Functions
        const URL_SERVEUR_IA = "https://genererexercice-fqjtknryra-uc.a.run.app";
        
        const catalogue = {
            "terminale": { 
                nomProfil: "Bac / Terminale", 
                code: "4444", 
                matieres: { 
                    "Mathématiques": ["Dérivées", "Suites", "Probabilités"], 
                    "Physique-Chimie": ["Cinématique", "Acides et Bases"] 
                } 
            },
            "seconde": { 
                nomProfil: "Seconde", 
                code: "2222", 
                matieres: { 
                    "Mathématiques": ["Fonctions", "Géométrie", "Vecteurs"], 
                    "Physique": ["Optique", "Mécanique"] 
                } 
            },
            "cm2": { 
                nomProfil: "CM2", 
                code: "3333", 
                matieres: { 
                    "Mathématiques": ["Fractions", "Division", "Géométrie"], 
                    "Français": ["Conjugaison", "Grammaire"] 
                } 
            }
        };

        let currentProfileId = null;
        let currentMatiere = null;
        let currentQ = null;
        let hintLevel = 0;

        const container = document.getElementById('app-container');

        function showSelectionProfil() {
            currentProfileId = null;
            document.getElementById('user-info').classList.add('hidden');
            let html = `<h2 class="text-2xl font-bold mb-6 text-center text-slate-800">Qui va réviser ?</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">`;
            for (let id in catalogue) {
                html += `
                <button onclick="verifierCode('${id}')" class="p-6 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left group">
                    <div class="text-xl font-bold text-slate-700 group-hover:text-indigo-600">${catalogue[id].nomProfil}</div>
                    <div class="text-sm text-slate-500">Accès protégé</div>
                </button>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function verifierCode(id) {
            const codeSaisi = prompt(`Code secret pour ${catalogue[id].nomProfil} :`);
            if (codeSaisi === catalogue[id].code) {
                currentProfileId = id;
                document.getElementById('user-info').textContent = catalogue[id].nomProfil;
                document.getElementById('user-info').classList.remove('hidden');
                showMatieres();
            } else {
                alert("Code incorrect !");
            }
        }

        function showMatieres() {
            let info = catalogue[currentProfileId];
            let html = `<button onclick="showSelectionProfil()" class="text-indigo-600 mb-4 inline-block"><i class="fas fa-arrow-left"></i> Retour</button>
                        <h2 class="text-2xl font-bold mb-6 text-slate-800">Choisis ta matière :</h2>
                        <div class="grid grid-cols-2 gap-4">`;
            for (let m in info.matieres) {
                html += `<button onclick="startIA('${m}')" class="p-4 bg-slate-100 rounded-lg hover:bg-indigo-600 hover:text-white font-semibold transition-colors">${m}</button>`;
            }
            container.innerHTML = html + `</div>`;
        }

        async function startIA(matiere) {
            currentMatiere = matiere;
            container.innerHTML = `
                <div class="text-center py-10">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
                    <p class="text-xl text-slate-600 animate-pulse">L'IA prépare ton exercice...</p>
                </div>`;

            const info = catalogue[currentProfileId];
            const themes = info.matieres[matiere];
            const theme = themes[Math.floor(Math.random() * themes.length)];

            try {
                const response = await fetch(URL_SERVEUR_IA, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ profil: info.nomProfil, matiere: matiere, theme: theme })
                });

                if (!response.ok) throw new Error("Erreur Serveur");

                const data = await response.json();
                
                // --- SÉCURITÉ ANTI-UNDEFINED ---
                currentQ = {
                    theme: data.theme || theme,
                    target: data.target || data.objectif || "Révision",
                    question: data.question || data.enonce || "Erreur de chargement",
                    answer: data.answer || data.reponse || "",
                    explanation: data.explanation || data.explication || "",
                    hints: data.hints || data.indices || []
                };

                hintLevel = 0;
                renderExercice();
            } catch (e) {
                container.innerHTML = `<div class="text-center text-red-500 py-10">
                    <p class="mb-4">Impossible de contacter le serveur d'IA.</p>
                    <button onclick="showMatieres()" class="bg-indigo-600 text-white px-4 py-2 rounded">Réessayer</button>
                </div>`;
            }
        }

        function renderExercice() {
            let hintHtml = "";
            if (hintLevel > 0 && currentQ.hints.length >= hintLevel) {
                hintHtml = `<div class="mt-4 p-4 bg-amber-50 border-l-4 border-amber-400 text-amber-800">
                    <strong>Indice :</strong> ${currentQ.hints[hintLevel-1]}
                </div>`;
            }

            container.innerHTML = `
                <div class="mb-4 flex justify-between items-center text-sm">
                    <span class="bg-indigo-100 text-indigo-800 font-bold px-2 py-1 rounded">${currentQ.theme}</span>
                    <button onclick="showMatieres()" class="text-slate-400">Changer</button>
                </div>
                <h3 class="text-lg font-semibold text-slate-500 mb-4">Objectif : ${currentQ.target}</h3>
                <div class="text-xl text-slate-800 bg-slate-50 p-6 rounded-xl border mb-6">
                    ${currentQ.question.replace(/\n/g, '<br>')}
                </div>
                ${hintHtml}
                <div class="flex gap-3 mt-6">
                    <button onclick="revelerCorrection()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold">Voir la réponse</button>
                    <button onclick="hintLevel++; renderExercice()" class="bg-white border-2 border-amber-400 text-amber-600 px-6 py-3 rounded-xl font-bold">Indice</button>
                </div>
            `;
        }

        function revelerCorrection() {
            container.innerHTML = `
                <div class="bg-green-50 border-2 border-green-200 rounded-2xl p-6">
                    <h2 class="text-2xl font-bold text-green-700 mb-4">Correction</h2>
                    <p class="text-2xl font-bold mb-4">${currentQ.answer}</p>
                    <p class="text-slate-700 mb-6">${currentQ.explanation.replace(/\n/g, '<br>')}</p>
                    <button onclick="startIA('${currentMatiere}')" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">Suivant</button>
                </div>
            `;
        }

        showSelectionProfil();
    </script>
</body>
</html>
